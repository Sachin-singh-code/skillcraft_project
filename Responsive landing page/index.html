<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: transparent;
    transition: 0.4s ease;
    z-index: 1000;
}

nav.scrolled {
    background: #111;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    padding: 15px 50px;
}

.logo {
    color: rgb(228, 220, 220);
    font-size: 22px;
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav ul li a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
    position: relative;
}

nav ul li a:hover {
    color: #00c3ff;
}

nav ul li a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: #00c3ff;
    transition: 0.3s;
}

nav ul li a:hover::after {
    width: 100%;
}

section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    color: white;
}

#home { background: linear-gradient(135deg, #1f1c2c, #928dab); }
#about { background: #16213e; }
#services { background: #0f3460; }
#contact { background: #1a1a2e; }

@media (max-width: 768px) {
    nav {
        padding: 15px 20px;
    }

    nav ul {
        gap: 15px;
    }

    section {
        font-size: 28px;
        text-align: center;
        padding: 20px;
    }
}
</style>
</head>

<body>

<nav id="navbar">
    <div class="logo">SkillCraft</div>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home">Home Section</section>
<section id="about">About Section</section>
<section id="services">Services Section</section>
<section id="contact">Contact Section</section>

<script>
window.addEventListener("scroll", function() {
    const navbar = document.getElementById("navbar");
    if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
    } else {
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
